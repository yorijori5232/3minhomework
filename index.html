<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>3분 집안일</title>
<style>
  :root {
    --pkg-yellow: #f7e01e;
    --pkg-blue: #3fbcea;
    --pkg-navy: #123054;
    --pkg-red: #e8322b;
    --pkg-green: #43a94a;
    --cream: #fdf6e0;
    --cream-dim: #ece2c4;
    --ink: #123054;
    --ink-soft: #6d7c8c;
    --paper: #ffffff;
    --shadow: rgba(18, 48, 84, .2);

    /* 에셋 기준값 — 봉지 이미지의 절취선(노치) 위치 */
    --tear-y: 17.2%;
    --notch-left: 9.2%;
    --notch-right: 90.8%;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--cream);
    background-image:
      radial-gradient(circle at 18% 8%, rgba(247,224,30,.28), transparent 46%),
      radial-gradient(circle at 88% 88%, rgba(63,188,234,.2), transparent 52%);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    touch-action: manipulation;
  }

  #app {
    min-height: 100dvh; display: grid; place-items: center;
    padding: clamp(16px, 4vw, 32px);
  }

  .scene {
    width: 100%; max-width: 440px;
    display: none; flex-direction: column; align-items: center;
    gap: clamp(14px, 2.4dvh, 22px);
  }
  .scene.active { display: flex; animation: fadeUp .45s cubic-bezier(.2,.8,.2,1); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }

  /* ---------- 타이틀 ---------- */
  .brand { text-align: center; }
  .brand-title {
    font-size: clamp(26px, 7vw, 34px); font-weight: 900; letter-spacing: -.03em;
  }
  .brand-sub {
    margin-top: 8px; font-size: clamp(13px, 3.6vw, 15px);
    line-height: 1.6; color: var(--ink-soft); word-break: keep-all;
  }
  .brand-sub:empty { display: none; }

  /* ---------- 난이도 ---------- */
  .spice {
    display: flex; gap: 6px;
    background: rgba(255,255,255,.75);
    border: 1.5px solid var(--cream-dim);
    border-radius: 999px; padding: 4px;
  }
  .spice button {
    font: inherit; font-size: 13px; font-weight: 800;
    border: 0; background: transparent; color: var(--ink-soft);
    padding: 9px 18px; border-radius: 999px; cursor: pointer;
    transition: background .2s, color .2s, transform .1s;
    white-space: nowrap;
  }
  .spice button:hover { color: var(--ink); }
  .spice button[data-spice="mild"][aria-pressed="true"] {
    background: var(--pkg-green); color: #fff;
    box-shadow: 0 3px 10px rgba(67,169,74,.35);
  }
  .spice button[data-spice="hot"][aria-pressed="true"] {
    background: var(--pkg-red); color: #fff;
    box-shadow: 0 3px 10px rgba(232,50,43,.35);
  }
  .spice button:active { transform: scale(.96); }

  /* ---------- 봉지 ---------- */
  .pkg-stage {
    position: relative; width: 100%;
    display: grid; place-items: center;
  }

  /* 화면의 가로·세로 중 먼저 걸리는 쪽에 맞춰 봉지 크기를 정한다.
     calc(44dvh * 754/967) = 높이 44dvh를 채울 때의 너비 → 세로가 짧은 창에서도 안 잘린다. */
  .pkg {
    position: relative;
    width: clamp(180px, min(72vw, calc(44dvh * 754 / 967)), 300px);
    aspect-ratio: 754 / 967;
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .pkg-stage:hover .pkg:not(.opened) { transform: translateY(-4px) rotate(-.7deg); }

  /* 뚜껑 = 절취선 윗부분 / 몸통 = 아랫부분. 같은 이미지를 두 창으로 나눠 본다 */
  .pkg-lid, .pkg-body {
    position: absolute; left: 0; width: 100%; overflow: hidden;
    filter: drop-shadow(0 10px 18px var(--shadow));
  }
  .pkg-lid {
    top: 0; height: var(--tear-y);
    transform-origin: left bottom;
    clip-path: var(--lid-clip, none);
    will-change: transform;
    z-index: 2;
  }
  .pkg-body {
    top: var(--tear-y); bottom: 0; height: auto;
    clip-path: var(--body-clip, none);
    z-index: 1;
  }
  .pkg-lid img, .pkg-body img {
    position: absolute; left: 0; width: 100%; display: block;
    user-select: none; -webkit-user-drag: none; pointer-events: none;
  }
  .pkg-lid img { top: 0; }
  .pkg-body img { bottom: 0; }

  /* 손잡이 — 봉지 왼쪽 절취 노치 위에 올린다 */
  .tear-handle {
    position: absolute;
    top: var(--tear-y); left: var(--notch-left);
    width: 44px; height: 44px; margin: -22px 0 0 -22px;
    border-radius: 50%;
    background: #fff; border: 2.5px solid var(--pkg-navy);
    color: var(--pkg-navy);
    display: grid; place-items: center;
    font-size: 17px; font-weight: 900;
    cursor: grab; touch-action: none; z-index: 6;
    box-shadow: 0 4px 12px rgba(18,48,84,.3);
    animation: nudge 1.8s ease-in-out infinite;
  }
  .tear-handle:active { cursor: grabbing; animation: none; }
  .tear-handle:focus-visible { outline: 3px solid var(--pkg-navy); outline-offset: 3px; }
  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(7px); }
  }
  .pkg.opened .tear-handle { opacity: 0; pointer-events: none; }

  .lid-fly { animation: flyOff .75s cubic-bezier(.4,0,.6,1) forwards; }
  @keyframes flyOff {
    to { transform: translate(80px, -190px) rotate(34deg); opacity: 0; }
  }

  .tear-hint {
    font-size: 13px; font-weight: 700; color: var(--ink-soft);
    display: flex; align-items: center; gap: 6px;
  }
  .tear-hint .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--pkg-red);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity: .25; } }

  .steam {
    position: absolute; top: 30%; left: 50%;
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,.95);
    pointer-events: none; z-index: 3;
    animation: steamUp 1.1s ease-out forwards;
  }
  @keyframes steamUp {
    from { transform: translate(-50%, 0) scale(.5); opacity: .9; }
    to   { transform: translate(calc(-50% + var(--dx, 0px)), -110px) scale(2.2); opacity: 0; }
  }

  /* ---------- 미션 카드 ---------- */
  .card {
    width: 100%; background: var(--paper);
    border-radius: 20px; padding: clamp(26px, 5vw, 34px) clamp(20px, 5vw, 26px);
    text-align: center;
    box-shadow: 0 16px 34px var(--shadow);
    border: 1.5px solid var(--cream-dim);
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; inset: 0 0 auto 0; height: 6px;
    background: linear-gradient(90deg, var(--pkg-yellow), var(--pkg-blue), var(--pkg-navy));
  }
  .card-meta {
    display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .chip {
    font-size: 11px; font-weight: 800; letter-spacing: .04em;
    padding: 5px 11px; border-radius: 999px;
    background: var(--cream); color: var(--ink-soft);
    border: 1px solid var(--cream-dim);
  }
  .chip.mild { background: var(--pkg-green); color: #fff; border-color: transparent; }
  .chip.hot  { background: var(--pkg-red); color: #fff; border-color: transparent; }
  .mission {
    font-size: clamp(20px, 5.6vw, 26px); font-weight: 900;
    line-height: 1.45; letter-spacing: -.02em;
    word-break: keep-all;
  }
  .tip {
    margin: 14px auto 0; padding-top: 13px;
    max-width: 30em;
    border-top: 1px dashed var(--cream-dim);
    font-size: clamp(12px, 3.2vw, 13px); line-height: 1.6;
    color: var(--ink-soft); word-break: keep-all;
  }
  .tip b {
    color: var(--pkg-navy); font-weight: 800; letter-spacing: .04em;
    margin-right: 5px;
  }
  .card-swap { animation: swap .3s ease; }
  @keyframes swap { from { opacity: 0; transform: translateY(8px) scale(.98); } }

  /* ---------- 타이머 ---------- */
  .timer {
    margin-top: 18px; padding-top: 16px;
    border-top: 1px solid var(--cream-dim);
    animation: swap .3s ease;
  }
  .timer-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 10px; margin-bottom: 9px;
  }
  .timer-label {
    font-size: 12px; font-weight: 700; color: var(--ink-soft);
    text-align: left; word-break: keep-all;
  }
  .timer-time {
    font-size: clamp(20px, 5vw, 23px); font-weight: 900;
    color: var(--pkg-navy); line-height: 1;
    font-variant-numeric: tabular-nums; letter-spacing: .02em;
  }
  .timer-bar {
    height: 9px; border-radius: 999px; overflow: hidden;
    background: var(--cream-dim);
  }
  .timer-bar span {
    display: block; height: 100%; width: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--pkg-green), var(--pkg-yellow));
    transition: width 1s linear;
  }
  /* 시간이 다 되면 남은 시간 대신 마무리 안내로 바뀐다 */
  .timer.up .timer-time { color: var(--pkg-red); }
  .timer.up .timer-label { color: var(--pkg-red); font-weight: 800; }
  .timer.up .timer-bar { background: rgba(232,50,43,.18); }

  /* ---------- 버튼 ---------- */
  .actions { width: 100%; display: flex; flex-direction: column; gap: 9px; }
  .btn {
    font: inherit; font-weight: 800; font-size: 16px;
    border: 0; border-radius: 14px; padding: 16px; width: 100%;
    cursor: pointer; transition: transform .1s, box-shadow .2s, background .2s;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary {
    background: var(--pkg-navy); color: #fff;
    box-shadow: 0 8px 20px rgba(18,48,84,.28);
  }
  .btn-primary:hover { background: #0b2440; }
  .btn-ghost {
    background: transparent; color: var(--ink-soft);
    border: 1.5px solid var(--cream-dim); font-size: 14px; padding: 13px;
  }
  .btn-ghost:hover { background: rgba(255,255,255,.7); color: var(--ink); }
  .btn-share {
    background: var(--pkg-yellow); color: var(--pkg-navy); font-size: 14px; padding: 13px;
    box-shadow: 0 6px 16px rgba(247,224,30,.5);
  }
  .btn-share:hover { background: #ffe92e; }

  /* ---------- 완료 ---------- */
  .done-mark {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--pkg-green); color: #fff;
    display: grid; place-items: center; font-size: 44px;
    box-shadow: 0 12px 28px rgba(67,169,74,.4);
    animation: pop .5s cubic-bezier(.2,1.5,.4,1);
  }
  @keyframes pop {
    from { transform: scale(0) rotate(-30deg); }
    60%  { transform: scale(1.15) rotate(6deg); }
    to   { transform: scale(1); }
  }
  .done-title {
    font-size: 25px; font-weight: 900; letter-spacing: -.03em;
    text-align: center; word-break: keep-all; line-height: 1.4;
  }
  .done-sub { font-size: 15px; font-weight: 600; color: var(--ink-soft); }

  .sound-toggle {
    position: fixed; top: 16px; right: 16px;
    width: 38px; height: 38px; border-radius: 50%;
    border: 1.5px solid var(--cream-dim); background: rgba(255,255,255,.75);
    cursor: pointer; font-size: 15px; line-height: 1; z-index: 20;
  }

  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 20px);
    background: var(--pkg-navy); color: #fff;
    font-size: 13px; font-weight: 700; padding: 11px 18px; border-radius: 999px;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 30;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* top/left를 고정하지 않으면 문서 끝에 1px만큼 얹혀 스크롤바가 생긴다 */
  .sr-only {
    position: absolute; top: 0; left: 0;
    width: 1px; height: 1px; overflow: hidden;
    clip: rect(0 0 0 0); white-space: nowrap;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>

<button class="sound-toggle" id="soundToggle" aria-pressed="true" title="소리 켜기/끄기">🔊</button>

<div id="app">

  <!-- ========== 1. 메인 ========== -->
  <section class="scene active" id="sceneMain">
    <div class="brand">
      <h1 class="brand-title">3분 집안일</h1>
      <p class="brand-sub">미뤄둔 집안일 지금 바로 시작하세요!</p>
    </div>

    <div class="spice" role="group" aria-label="난이도 선택">
      <button data-spice="mild" aria-pressed="true">순한맛 · 3분 이내</button>
      <button data-spice="hot" aria-pressed="false">매운맛 · 5분 이상</button>
    </div>

    <div class="pkg-stage">
      <div class="pkg" id="pkg">
        <div class="pkg-lid" id="pkgLid"><img id="lidImg" src="assets/pkg-mild.png" alt="" /></div>
        <div class="pkg-body" id="pkgBody"><img id="bodyImg" src="assets/pkg-mild.png" alt="3분 집안일 순한맛 봉지" /></div>
        <button class="tear-handle" id="tearHandle" aria-label="봉지 뜯기 — 오른쪽으로 드래그하거나 눌러서 여세요">↦</button>
      </div>
    </div>

    <p class="tear-hint"><span class="dot"></span> 절취선을 오른쪽으로 쭉 당기세요</p>
  </section>

  <!-- ========== 2. 미션 ========== -->
  <section class="scene" id="sceneMission">
    <div class="card" id="missionCard">
      <div class="card-meta">
        <span class="chip mild" id="chipSpice">순한맛</span>
        <span class="chip" id="chipSpace">#거실</span>
        <span class="chip" id="chipTime">1분</span>
      </div>
      <p class="mission" id="missionText">소파 쿠션 위치 정리하기</p>
      <p class="tip" id="tipText"><b>TIP</b><span id="tipBody">세워서 모서리만 맞춰도 정돈돼 보여요.</span></p>

      <div class="timer" id="timer" hidden>
        <div class="timer-head">
          <span class="timer-label" id="timerLabel">남은 시간</span>
          <span class="timer-time" id="timerTime">01:00</span>
        </div>
        <div class="timer-bar"><span id="timerFill"></span></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnStart">시작하기</button>
      <button class="btn btn-primary" id="btnDone" hidden>완료했어요</button>
      <button class="btn btn-ghost" id="btnReroll">다시 뽑기</button>
    </div>
  </section>

  <!-- ========== 3. 완료 ========== -->
  <section class="scene" id="sceneDone">
    <div class="done-mark">✓</div>
    <h2 class="done-title">미루기의 굴레에서 벗어나기 성공</h2>
    <p class="done-sub">오늘도 수고했어요!</p>

    <div class="actions">
      <button class="btn btn-primary" id="btnAgain">하나 더 뽑기</button>
      <button class="btn btn-ghost" id="btnHome">오늘은 여기까지</button>
      <button class="btn btn-share" id="btnShare">친구에게 공유하기</button>
    </div>
  </section>

</div>

<div class="toast" id="toast"></div>
<p class="sr-only" id="live" role="status" aria-live="polite"></p>

<script src="missions.js"></script>
<script>
(() => {
  'use strict';

  /* ================= 데이터 ================= */

  const SPICE = {
    mild: { label: '순한맛', asset: 'assets/pkg-mild.png' },
    hot:  { label: '매운맛', asset: 'assets/pkg-hot.png' },
  };

  const MISSIONS = window.MISSIONS;

  /* ================= 상태 ================= */

  const state = { spice: 'mild', mission: null, sound: true, timerId: null };

  const $ = (id) => document.getElementById(id);
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const live = (msg) => { $('live').textContent = msg; };

  let toastTimer = null;
  function toast(msg) {
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  /* ================= 사운드 (WebAudio 합성) ================= */

  let actx = null;
  const audio = () => (actx ||= new (window.AudioContext || window.webkitAudioContext)());

  function playRip(intensity = 1) {
    if (!state.sound) return;
    try {
      const ctx = audio();
      const len = Math.floor(ctx.sampleRate * 0.14);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1600 + intensity * 1800;
      filter.Q.value = 0.7;
      const gain = ctx.createGain();
      gain.gain.value = 0.05 * intensity;
      src.connect(filter).connect(gain).connect(ctx.destination);
      src.start();
    } catch (_) { /* 사운드는 있으면 좋고 없어도 그만 */ }
  }

  function playDing() {
    if (!state.sound) return;
    try {
      const ctx = audio();
      const now = ctx.currentTime;
      [880, 1320].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, now + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.14, now + i * 0.08 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.08 + 0.5);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + i * 0.08);
        osc.stop(now + i * 0.08 + 0.5);
      });
    } catch (_) {}
  }

  /* ================= 톱니 절취선 ================= */

  function zigzag() {
    const teeth = 30, depth = 5;
    const top = [], bottom = [];
    for (let i = 0; i <= teeth; i++) {
      const x = ((i / teeth) * 100).toFixed(2);
      const y = i % 2 === 0 ? 0 : depth;
      top.push(`${x}% ${y}px`);
      bottom.push(`${x}% calc(100% - ${depth - y}px)`);
    }
    $('pkgLid').style.setProperty('--lid-clip',
      `polygon(0 0, 100% 0, ${bottom.reverse().join(', ')}, 0 0)`);
    $('pkgBody').style.setProperty('--body-clip',
      `polygon(${top.join(', ')}, 100% 100%, 0 100%)`);
  }

  /* ================= 뜯기 인터랙션 ================= */

  const pkg = $('pkg');
  const lid = $('pkgLid');
  const handle = $('tearHandle');

  let dragging = false, progress = 0, lastSoundAt = 0, opened = false;

  // 왼쪽 노치에서 오른쪽 노치까지가 당겨야 할 거리
  const tearSpan = () => pkg.offsetWidth * 0.816;

  function setProgress(p) {
    progress = Math.max(0, Math.min(1, p));
    lid.style.transform = `rotate(${progress * 6}deg) translateY(${-progress * 10}px)`;
    handle.style.transform = `translateX(${progress * tearSpan()}px) rotate(${progress * 20}deg)`;

    if (progress - lastSoundAt > 0.08) {
      lastSoundAt = progress;
      playRip(0.4 + progress * 0.6);
    }
    if (progress >= 0.82) finishTear();
  }

  function resetTear() {
    dragging = false; progress = 0; lastSoundAt = 0; opened = false;
    lid.className = 'pkg-lid';
    lid.style.transform = '';
    handle.style.transform = '';
    pkg.classList.remove('opened');
  }

  function releaseTear() {
    if (!dragging || opened) return;
    dragging = false;
    lid.style.transition = 'transform .3s ease';
    handle.style.transition = 'transform .3s ease';
    setTimeout(() => { lid.style.transition = ''; handle.style.transition = ''; }, 320);
    progress = 0; lastSoundAt = 0;
    lid.style.transform = '';
    handle.style.transform = '';
  }

  function finishTear() {
    if (opened) return;
    opened = true; dragging = false;
    pkg.classList.add('opened');
    lid.classList.add('lid-fly');
    playRip(1.4);
    steam();
    setTimeout(() => { rollMission(); go('sceneMission'); }, 640);
  }

  function steam() {
    const stage = pkg.parentElement;
    for (let i = 0; i < 7; i++) {
      const p = document.createElement('span');
      p.className = 'steam';
      p.style.setProperty('--dx', `${(Math.random() - 0.5) * 90}px`);
      p.style.animationDelay = `${i * 70}ms`;
      stage.appendChild(p);
      setTimeout(() => p.remove(), 1400 + i * 70);
    }
  }

  handle.addEventListener('pointerdown', (e) => {
    if (opened) return;
    dragging = true;
    handle.setPointerCapture(e.pointerId);
    handle.dataset.startX = String(e.clientX);
  });

  handle.addEventListener('pointermove', (e) => {
    if (!dragging || opened) return;
    setProgress((e.clientX - Number(handle.dataset.startX || 0)) / tearSpan());
  });

  handle.addEventListener('pointerup', releaseTear);
  handle.addEventListener('pointercancel', releaseTear);

  // 클릭 / 키보드 폴백 — 드래그가 어려운 환경에서도 열 수 있게
  handle.addEventListener('click', (e) => {
    if (opened || progress > 0.05) return;
    e.preventDefault();
    let p = 0;
    const tick = () => {
      p += 0.05;
      setProgress(p);
      if (p < 0.82 && !opened) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });

  /* ================= 씬 전환 ================= */

  function go(id) {
    document.querySelectorAll('.scene').forEach((s) => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  /* ================= 미션 ================= */

  function rollMission() {
    const pool = MISSIONS[state.spice];
    let next = pick(pool);
    if (pool.length > 1) {
      while (state.mission && next.m === state.mission.m) next = pick(pool);
    }
    state.mission = next;

    $('chipSpice').textContent = SPICE[state.spice].label;
    $('chipSpice').className = `chip ${state.spice}`;
    $('chipSpace').textContent = `#${next.s}`;
    $('chipTime').textContent = next.t;
    $('missionText').textContent = next.m;
    $('tipBody').textContent = next.tip;
    resetTimer();

    const card = $('missionCard');
    card.classList.remove('card-swap');
    void card.offsetWidth;
    card.classList.add('card-swap');

    live(`오늘의 집안일: ${next.m}`);
  }

  /* ================= 타이머 ================= */

  // '3분' → 180. setInterval은 백그라운드 탭에서 밀리므로 종료 시각을 기준으로 남은 초를 다시 계산한다.
  const toSeconds = (t) => parseInt(t, 10) * 60;
  const mmss = (sec) => {
    const s = Math.max(0, sec);
    return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
  };

  function stopTimer() {
    clearInterval(state.timerId);
    state.timerId = null;
  }

  // 미션을 새로 뽑거나 화면을 떠날 때의 초기 상태 — 타이머를 숨기고 버튼을 '시작하기'로 되돌린다
  function resetTimer() {
    stopTimer();
    const timer = $('timer');
    timer.hidden = true;
    timer.classList.remove('up');
    $('timerLabel').textContent = '남은 시간';
    $('timerFill').style.transition = '';
    $('timerFill').style.width = '100%';
    $('timerTime').textContent = state.mission ? mmss(toSeconds(state.mission.t)) : '00:00';
    $('btnStart').hidden = false;
    $('btnDone').hidden = true;
  }

  function startTimer() {
    const total = toSeconds(state.mission.t);
    const endAt = Date.now() + total * 1000;

    const timer = $('timer');
    timer.hidden = false;
    timer.classList.remove('up');
    $('timerLabel').textContent = '남은 시간';
    $('btnStart').hidden = true;
    $('btnDone').hidden = false;

    // 첫 프레임은 100%에서 시작해야 막대가 처음부터 줄어드는 게 보인다
    $('timerFill').style.transition = 'none';
    $('timerFill').style.width = '100%';
    void $('timerFill').offsetWidth;
    $('timerFill').style.transition = '';

    const tick = () => {
      const left = Math.round((endAt - Date.now()) / 1000);
      $('timerTime').textContent = mmss(left);
      $('timerFill').style.width = `${Math.max(0, (left / total) * 100)}%`;
      if (left <= 0) {
        stopTimer();
        timer.classList.add('up');
        $('timerLabel').textContent = '시간 끝! 마무리하고 완료를 눌러주세요';
        playDing();
        live('시간이 끝났어요.');
      }
    };

    stopTimer();
    tick();
    state.timerId = setInterval(tick, 250);
    live(`${state.mission.t} 타이머를 시작했어요.`);
  }

  /* ================= 공유 ================= */

  async function share() {
    const text = '미뤘던 집안일 지금 당장 시작하기';
    // Streamlit처럼 iframe 안에서 돌 때는 location.href가 about:srcdoc이라 공유가 깨진다.
    // 그런 환경에서는 감싸는 쪽이 window.SHARE_URL로 실제 주소를 넣어준다.
    const url = window.SHARE_URL || location.href;
    if (navigator.share) {
      try {
        await navigator.share({ title: '3분 집안일', text, url });
        return;
      } catch (err) {
        if (err && err.name === 'AbortError') return; // 사용자가 공유창을 닫음
      }
    }
    try {
      await navigator.clipboard.writeText(`${text} ${url}`);
      toast('공유 문구를 복사했어요');
    } catch (_) {
      toast('공유를 지원하지 않는 환경이에요');
    }
  }

  /* ================= 이벤트 ================= */

  document.querySelectorAll('.spice button').forEach((btn) => {
    btn.addEventListener('click', () => {
      state.spice = btn.dataset.spice;
      document.querySelectorAll('.spice button').forEach((b) =>
        b.setAttribute('aria-pressed', String(b === btn)));
      const { asset, label } = SPICE[state.spice];
      $('lidImg').src = asset;
      $('bodyImg').src = asset;
      $('bodyImg').alt = `3분 집안일 ${label} 봉지`;
    });
  });

  $('btnReroll').addEventListener('click', rollMission);

  $('btnStart').addEventListener('click', startTimer);

  $('btnDone').addEventListener('click', () => {
    stopTimer();
    playDing();
    go('sceneDone');
    live('미루기의 굴레에서 벗어나기 성공');
  });

  $('btnShare').addEventListener('click', share);

  [$('btnAgain'), $('btnHome')].forEach((btn) =>
    btn.addEventListener('click', () => { stopTimer(); resetTear(); go('sceneMain'); }));

  $('soundToggle').addEventListener('click', (e) => {
    state.sound = !state.sound;
    e.currentTarget.textContent = state.sound ? '🔊' : '🔇';
    e.currentTarget.setAttribute('aria-pressed', String(state.sound));
  });

  /* ================= 초기화 ================= */

  zigzag();
})();
</script>
</body>
</html>
